apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: prometheus
resources:
  - podmonitor.yaml
generatorOptions:
  disableNameSuffixHash: true
  labels:
    grafana_dashboard: "1"
configMapGenerator:
  - name: grafana-dashboards
    files:
      - ./dashboards/argocd-performance.json
      - ./dashboards/argocd-app-health.json
      - ./dashboards/loki-logs.json
      - ./dashboards/tempo-tracing.json
      - ./dashboards/phlare-profiling.json
      - ./dashboards/victoriametrics-health.json
      - ./dashboards/metallb-services.json
      - ./dashboards/cert-manager.json
