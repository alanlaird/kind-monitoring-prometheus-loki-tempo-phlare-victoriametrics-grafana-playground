---
# NFS PersistentVolumes — static provisioning via csi-driver-nfs
# Config dirs live at ophir:/media/k8s/<service>
# Media libraries at ophir:/media/movies-fir, ophir:/media/tv-fir, ophir:/media
# Downloads at ophir:/media/downloads (shared scratch space)

# ── sabnzbd config ──────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sabnzbd-config
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: ophir/media/k8s/sabnzbd
    volumeAttributes:
      server: ophir
      share: /media/k8s/sabnzbd
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sabnzbd-config
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ""
  volumeName: sabnzbd-config
  resources:
    requests:
      storage: 5Gi

