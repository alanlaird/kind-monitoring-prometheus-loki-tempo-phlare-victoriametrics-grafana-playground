---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: downloads
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-ophir-downloads
  resources:
    requests:
      storage: 500Gi
