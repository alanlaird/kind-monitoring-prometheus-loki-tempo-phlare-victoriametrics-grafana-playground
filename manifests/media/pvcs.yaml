---
# Dynamic NFS StorageClasses via csi-driver-nfs
# Using dynamic provisioning avoids NodeRestriction issues with static PVs in k8s 1.27+.
#
# nfs-ophir-config   → ophir:/media/k8s/<pvc-name>/   (service config dirs)
# nfs-ophir-movies   → ophir:/media/movies-fir         (movie library)
# nfs-ophir-tv       → ophir:/media/tv-fir             (TV library)
# nfs-ophir-downloads→ ophir:/media/downloads          (shared download scratch)

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-ophir-config
provisioner: nfs.csi.k8s.io
parameters:
  server: ophir
  share: /media/k8s
  subDir: ${pvc.metadata.name}
  onDeletePolicy: retain
mountOptions:
  - nfsvers=3
  - nolock
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-ophir-movies
provisioner: nfs.csi.k8s.io
parameters:
  server: ophir
  share: /media/movies-fir
  onDeletePolicy: retain
mountOptions:
  - nfsvers=3
  - nolock
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-ophir-tv
provisioner: nfs.csi.k8s.io
parameters:
  server: ophir
  share: /media/tv-fir
  onDeletePolicy: retain
mountOptions:
  - nfsvers=3
  - nolock
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-ophir-downloads
provisioner: nfs.csi.k8s.io
parameters:
  server: ophir
  share: /media/downloads
  onDeletePolicy: retain
mountOptions:
  - nfsvers=3
  - nolock
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true

---
# ── config PVCs (dynamic, subDir per pvc name → /media/k8s/<name>/) ──────────

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sabnzbd
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-ophir-config
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: radarr
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-ophir-config
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarr
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-ophir-config
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seerr
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-ophir-config
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plex
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-ophir-config
  resources:
    requests:
      storage: 20Gi

---
# ── shared media PVCs ─────────────────────────────────────────────────────────

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: movies
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-ophir-movies
  resources:
    requests:
      storage: 20Ti
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tv
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
